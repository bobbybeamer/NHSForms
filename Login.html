<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | Concise Forms Management</title>
    <meta name="description" content="Sign in to the Concise Forms Management portal">
    <meta name="author" content="BBallester">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-panel login-panel-brand">
            <img class="login-logo" src="files/NHS.jpeg" alt="NHS logo">
            <p class="eyebrow">Secure access</p>
            <h1>Concise Forms Management</h1>
            <p class="hero-text">Sign in to access waiver forms, approvals, and user administration for the procurement workflow.</p>
        </section>

        <section class="login-panel login-panel-form">
            <div class="login-copy">
                <h2>Sign in</h2>
                <p>Enter your username and password to continue.</p>
            </div>
            <form class="login-form" role="form">
                <label for="username">User name</label>
                <input id="username" name="username" type="text" placeholder="Enter user name">

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password">

                <a class="primary-action login-action" href="index.html">Sign In</a>
                <a class="secondary-action login-action" href="mailto:edd.james@nhs.net">Password Reset</a>
            </form>
        </section>
    </main>
</body>
</html>
